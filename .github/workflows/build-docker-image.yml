name: Release Triton Ascend Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile'
      - 'docker/Dockerfile.manylinux'
      - 'Makefile'
      - 'requirements.txt'
      - 'requirements_dev.txt'
      - '.github/workflows/build-docker-image.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docker/Dockerfile'
      - 'docker/Dockerfile.manylinux'
      - 'Makefile'
      - 'requirements.txt'
      - 'requirements_dev.txt'
      - '.github/workflows/build-docker-image.yml'

permissions:
  contents: read
  actions: write

jobs:
  build-images:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-910b
            dockerfile: docker/Dockerfile
            chip_type: "910b"
            cann_version: "8.5.0"
            torch_version: "2.7.1"
            tag_commit: "ubuntu-910b-{commit}"
            tag_latest: "ubuntu-910b-latest"
          - name: ubuntu-A3
            dockerfile: docker/Dockerfile
            chip_type: "A3"
            cann_version: "8.5.0"
            torch_version: "2.7.1"
            tag_commit: "ubuntu-A3-{commit}"
            tag_latest: "ubuntu-A3-latest"
          - name: manylinux-910b
            dockerfile: docker/Dockerfile.manylinux
            chip_type: "910b"
            cann_version: "8.5.0"
            torch_version: "2.7.1"
            tag_commit: "manylinux-910b-{commit}"
            tag_latest: "manylinux-910b-latest"
          - name: manylinux-A3
            dockerfile: docker/Dockerfile.manylinux
            chip_type: "A3"
            cann_version: "8.5.0"
            torch_version: "2.7.1"
            tag_commit: "manylinux-A3-{commit}"
            tag_latest: "manylinux-A3-latest"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_PASSWD }}

      - name: Generate tags
        id: tags
        run: |
          GIT_COMMIT_SHORT="$(git rev-parse --short HEAD)"
          TAG_COMMIT=$(echo "${{ matrix.tag_commit }}" | sed "s/{commit}/${GIT_COMMIT_SHORT}/")
          echo "tag_commit=${TAG_COMMIT}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            quay.io/ascend/triton:${{ steps.tags.outputs.tag_commit }}
            quay.io/ascend/triton:${{ matrix.tag_latest }}
          build-args: |
            CHIP_TYPE=${{ matrix.chip_type }}
            CANN_VERSION=${{ matrix.cann_version }}
            TORCH_VERSION=${{ matrix.torch_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max